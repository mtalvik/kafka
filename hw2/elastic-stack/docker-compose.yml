services:
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: opensearch
    environment:
      - cluster.name=kafka-lab
      - node.name=os-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - "OPENSEARCH_JAVA_OPTS=-Xms384m -Xmx384m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - os-data:/usr/share/opensearch/data
    networks:
      - elastic

  dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: dashboards
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
      - "NODE_OPTIONS=--max-old-space-size=200"
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    networks:
      - elastic

  kafbat:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafbat
    restart: unless-stopped
    environment:
      - KAFKA_CLUSTERS_0_NAME=kafka-lab
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=${KAFKA_BOOTSTRAP}
      - KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL=SASL_PLAINTEXT
      - KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM=PLAIN
      - KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFBAT_KAFKA_USER}" password="${KAFBAT_KAFKA_PASS}";
      - "JAVA_OPTS=-Xms128m -Xmx256m"
    ports:
      - "8080:8080"
    networks:
      - elastic

networks:
  elastic:
    driver: bridge

volumes:
  os-data:
