global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: kafka-jmx
    static_configs:
      - targets: ['kafka-jmx-exporter:7071']

  - job_name: zookeeper-jmx
    static_configs:
      - targets: ['zookeeper-jmx-exporter:7072']

  - job_name: kafka-exporter
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']
