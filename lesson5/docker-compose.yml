services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: demo-zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
      - "10020:10020"
      - "8080:8080"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_ADMIN_ENABLE_SERVER: "true"
      ZOOKEEPER_ADMIN_SERVER_PORT: 8080
      KAFKA_JMX_OPTS: >-
        -Dcom.sun.management.jmxremote=true
        -Dcom.sun.management.jmxremote.local.only=false
        -Dcom.sun.management.jmxremote.authenticate=false
        -Dcom.sun.management.jmxremote.ssl=false
        -Dcom.sun.management.jmxremote.port=10020
        -Dcom.sun.management.jmxremote.rmi.port=10020
        -Djava.rmi.server.hostname=zookeeper
        -Djava.net.preferIPv4Stack=true
    networks:
      - kafka-demo

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: demo-kafka
    hostname: kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
      - "10030:10030"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_JMX_PORT: 10030
      KAFKA_JMX_HOSTNAME: kafka
      KAFKA_JMX_OPTS: >-
        -Dcom.sun.management.jmxremote=true
        -Dcom.sun.management.jmxremote.local.only=false
        -Dcom.sun.management.jmxremote.authenticate=false
        -Dcom.sun.management.jmxremote.ssl=false
        -Dcom.sun.management.jmxremote.port=10030
        -Dcom.sun.management.jmxremote.rmi.port=10030
        -Djava.rmi.server.hostname=kafka
        -Djava.net.preferIPv4Stack=true
    networks:
      - kafka-demo

  kafka-jmx-exporter:
    build:
      context: ./docker/jmx-exporter
    container_name: demo-kafka-jmx-exporter
    depends_on:
      - kafka
    command: ["7071", "/etc/jmx/kafka.yml"]
    ports:
      - "7071:7071"
    volumes:
      - ./config/jmx/kafka.yml:/etc/jmx/kafka.yml:ro
    networks:
      - kafka-demo

  zookeeper-jmx-exporter:
    build:
      context: ./docker/jmx-exporter
    container_name: demo-zookeeper-jmx-exporter
    depends_on:
      - zookeeper
    command: ["7072", "/etc/jmx/zookeeper.yml"]
    ports:
      - "7072:7072"
    volumes:
      - ./config/jmx/zookeeper.yml:/etc/jmx/zookeeper.yml:ro
    networks:
      - kafka-demo

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: demo-kafka-exporter
    depends_on:
      - kafka
    command:
      - "--kafka.server=kafka:9092"
      - "--web.listen-address=:9308"
    ports:
      - "9308:9308"
    networks:
      - kafka-demo

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: demo-prometheus
    depends_on:
      - kafka-jmx-exporter
      - zookeeper-jmx-exporter
      - kafka-exporter
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - kafka-demo

  grafana:
    image: grafana/grafana:10.4.3
    container_name: demo-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - kafka-demo

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: demo-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_METRICS_PORT: 10030
      KAFKA_CLUSTERS_0_METRICS_TYPE: JMX
      AUTH_TYPE: DISABLED
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - kafka-demo

networks:
  kafka-demo:
    driver: bridge
